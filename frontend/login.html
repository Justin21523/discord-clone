<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - Discord Clone</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header" id="header-title">
            <h3>歡迎回來！</h3>
            <p>我們甚至都有點想你了。</p>
        </div>

        <div id="error-msg" style="color: var(--danger); font-size: 14px; display: none; margin-bottom: 10px;"></div>

        <form id="auth-form">
            <div class="form-group" id="username-group" style="display: none;">
                <label>使用者名稱</label>
                <input type="text" id="username" placeholder="暱稱">
            </div>

            <div class="form-group">
                <label>電子郵件</label>
                <input type="email" id="email" required placeholder="user@example.com">
            </div>

            <div class="form-group">
                <label>密碼</label>
                <input type="password" id="password" required placeholder="********">
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">登入</button>
        </form>

        <div class="switch-mode">
            <span id="switch-text">需要帳號嗎？</span>
            <a id="switch-btn">註冊</a>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
